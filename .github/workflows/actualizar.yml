name: Actualizar Dashboard desde Excel
on:
  push:
    paths:
      - 'proyecto.xlsx'  # Se activa cuando subes el Excel
  workflow_dispatch:      # Permite ejecución manual

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest
    permissions:
      contents: write        
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3
            
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
            
      - name: 📦 Instalar dependencias
        run: |
          pip install pandas openpyxl
            
      - name: 🔄 Generar data.js desde Excel
        run: |
          python scripts/excel_to_js.py proyecto.xlsx
            
      - name: 📤 Subir cambios a GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add docs/data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Actualización automática desde Excel [$(date +'%Y-%m-%d %H:%M')]"
          git push
